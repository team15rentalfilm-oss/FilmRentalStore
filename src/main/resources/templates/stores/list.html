<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Stores</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        .btn { padding: 8px 12px; text-decoration: none; border-radius: 4px; color: white; display: inline-block;}
        .btn-primary { background-color: #007bff; margin-bottom: 15px; }
        .btn-warning { background-color: #f39c12; margin-right: 5px; }
        .btn-danger { background-color: #e74c3c; }
    </style>
</head>
<body>

<h1>Store Management</h1>

<a th:href="@{/member/utsav}" style="display:block; margin-bottom: 15px;">&larr; Back to Profile</a>

<a th:href="@{/stores/new}" class="btn btn-primary">+ Add New Store</a>

<table>
    <thead>
    <tr>
        <th>Store ID</th>
        <th>Manager Staff ID</th>
        <th>Address ID</th>
        <th>Last Update</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="store : ${stores}">
        <td th:text="${store.storeId}"></td>
        <td th:text="${store.managerStaffId}"></td>
        <td th:text="${store.addressId}"></td>
        <td th:text="${#temporals.format(store.lastUpdate, 'yyyy-MM-dd HH:mm')}"></td>
        <td>
            <a th:href="@{/stores/edit/{id}(id=${store.storeId})}" class="btn btn-warning">Edit</a>
            <a th:href="@{/stores/delete/{id}(id=${store.storeId})}" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete this store?')">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
