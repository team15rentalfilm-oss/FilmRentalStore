<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Team 15 - Film Rental Store</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .team-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 40px;
        }
        .member-card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            width: 200px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .member-card:hover { transform: scale(1.05); }
        .member-card img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }
        .member-card a { text-decoration: none; color: #333; }
        .member-card a:hover { color: #007bff; }
    </style>
</head>
<body>

<h1>Meet Team 15</h1>
<p>Film Rental Store Management System</p>

<div class="team-container">
    <div class="member-card">
        <a th:href="@{/member/utsav}">
            <img th:src="@{/images/utsav.jpg}" alt="Utsav Sarda">
            <h3>Utsav Sarda</h3>
        </a>
    </div>

    <div class="member-card">
        <a th:href="@{/member/two}">
            <img th:src="@{/images/placeholder.jpg}" alt="Member 2">
            <h3>Member Two</h3>
        </a>
    </div>

</div>

</body>
</html>
